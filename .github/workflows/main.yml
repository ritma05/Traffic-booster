name: Turbo Traffic Booster
on:
  workflow_dispatch:  # Biar bisa lu klik 'Run' manual
  schedule:
    - cron: '*/15 * * * *'  # Jalan otomatis tiap 15 menit tanpa henti
jobs:
  gas-pol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Playwright (Mesin Bot)
        run: |
          pip install playwright
          playwright install chromium
      - name: Eksekusi Bot Cuan
        run: python ads.py
        
